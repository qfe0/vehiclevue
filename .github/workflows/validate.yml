name: Validate HACS Compatibility

on:
  push:
  pull_request:

jobs:
  validate-hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@master

  validate-hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: Create venv and install test deps
        run: uv venv && uv pip install -r requirements_test.txt
      - name: Run tests
        run: uv run pytest --tb=short -q

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"
      - name: Audit Python dependencies
        run: |
          pip install pip-audit
          pip-audit --requirement <(python3 -c "
          import json, sys
          m = json.load(open('custom_components/vehiclevue/manifest.json'))
          print('\n'.join(m.get('requirements', [])))
          ")


